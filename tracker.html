<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Location Tracker - FIXED</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { 
            max-width: 1200px; margin: 0 auto; 
            background: white; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        
        /* FIXED: Big Red Notice */
        .warning { 
            background: #ff6b6b; color: white; 
            padding: 20px; text-align: center; 
            font-size: 18px; font-weight: bold;
            margin: 20px;
        }
        
        .controls { 
            padding: 30px; display: flex; gap: 20px; 
            flex-wrap: wrap; justify-content: center;
        }
        button { 
            padding: 15px 30px; border: none; 
            border-radius: 25px; font-size: 18px; 
            cursor: pointer; transition: all 0.3s; 
            font-weight: 600;
        }
        .start-btn { background: #00b894; color: white; }
        .start-btn:hover:not(:disabled) { background: #00a085; transform: scale(1.05); }
        .stop-btn { background: #e17055; color: white; }
        .stop-btn:hover:not(:disabled) { background: #d63031; }
        .stop-btn:disabled, .start-btn:disabled { background: #ddd; cursor: not-allowed; }
        
        .status-box {
            padding: 30px; background: #f8f9fa;
            text-align: center;
        }
        #status { 
            font-size: 3em; margin-bottom: 10px; 
            font-weight: bold;
        }
        .status-green { color: #00b894; }
        .status-red { color: #e17055; }
        .status-yellow { color: #f39c12; }
        
        #map { height: 500px; width: 100%; margin: 20px 0; border-radius: 15px; }
        
        .debug-info {
            background: #e8f4fd; padding: 20px; margin: 20px;
            border-radius: 10px; font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Location Tracker - FIXED VERSION</h1>
            <p>Real-time GPS + 100% Working Guaranteed!</p>
        </div>

        <!-- FIXED: Clear Permission Guide -->
        <div class="warning">
            🔐 <strong>3 STEPS FOR LOCATION:</strong><br>
            1. Chrome/Firefox use karo<br>
            2. <strong>Start Tracking → ALLOW location</strong><br>
            3. VPN OFF karo
        </div>

        <div class="controls">
            <button id="startBtn" class="start-btn">🚀 START TRACKING</button>
            <button id="stopBtn" class="stop-btn" disabled>⏹️ STOP</button>
            <button id="testBtn">🧪 TEST LOCATION</button>
            <button id="clearBtn">🗑️ CLEAR DATA</button>
        </div>

        <div class="status-box">
            <div id="status" class="status-red">🔴 STOPPED</div>
            <div id="coords">Lat: -- | Lng: -- | Accuracy: --m</div>
            <div id="debug">Ready to track...</div>
        </div>

        <div id="map"></div>

        <div class="debug-info">
            <strong>📊 Live Debug:</strong><br>
            <div id="debugInfo">Status: Waiting...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script>
        class FixedLocationTracker {
            constructor() {
                this.isTracking = false;
                this.map = null;
                this.marker = null;
                this.watchId = null;
                this.init();
            }

            init() {
                this.createMap();
                this.bindButtons();
                this.testLocation(); // Auto test on load
            }

            createMap() {
                this.map = L.map('map').setView([28.6139, 77.2090], 10); // Delhi default
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
            }

            bindButtons() {
                document.getElementById('startBtn').onclick = () => this.start();
                document.getElementById('stopBtn').onclick = () => this.stop();
                document.getElementById('testBtn').onclick = () => this.testLocation();
                document.getElementById('clearBtn').onclick = () => this.clearAll();
            }

            // 🔥 FIXED: Simple One-Time Get Location
            testLocation() {
                if (!navigator.geolocation) {
                    this.showError('❌ Geolocation not supported in this browser');
                    return;
                }

                document.getElementById('debug').textContent = '🧪 Testing location...';
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        this.onLocationFound(position);
                        document.getElementById('debug').textContent = '✅ Location working! Click START';
                    },
                    (error) => {
                        this.showLocationError(error);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }

            start() {
                if (!navigator.geolocation) {
                    alert('❌ Browser location support nahi hai!');
                    return;
                }

                this.isTracking = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('status').textContent = '🟢 TRACKING LIVE';
                document.getElementById('status').className = 'status-green';

                // Continuous tracking
                this.watchId = navigator.geolocation.watchPosition(
                    (position) => this.onLocationFound(position),
                    (error) => this.showLocationError(error),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 10000 }
                );
            }

            stop() {
                if (this.watchId) {
                    navigator.geolocation.clearWatch(this.watchId);
                }
                this.isTracking = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('status').textContent = '🔴 STOPPED';
                document.getElementById('status').className = 'status-red';
            }

            onLocationFound(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                // Update display
                document.getElementById('coords').textContent = 
                    `Lat: ${lat.toFixed(6)} | Lng: ${lng.toFixed(6)} | Accuracy: ${accuracy.toFixed(0)}m`;
                
                document.getElementById('debugInfo').innerHTML = `
                    ✅ LIVE: ${new Date().toLocaleTimeString()}<br>
                    📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
                    📏 ${accuracy.toFixed(0)}m accuracy
                `;

                // Update map
                const pos = [lat, lng];
                this.map.setView(pos, 18);

                if (this.marker) {
                    this.marker.setLatLng(pos);
                } else {
                    this.marker = L.marker(pos, {
                        icon: L.divIcon({
                            html: '📍 <strong>YOU ARE HERE</strong>',
                            className: 'custom-icon',
                            iconSize: [50, 50]
                        })
                    }).addTo(this.map);
                }

                // Status green
                document.getElementById('status').className = 'status-green';
            }

            showLocationError(error) {
                let msg = '';
                switch(error.code) {
                    case 1: msg = '🚫 LOCATION DENIED - Browser settings check karo'; break;
                    case 2: msg = '📴 GPS OFF hai - Phone GPS ON karo'; break;
                    case 3: msg = '⏰ TIMEOUT - Internet slow hai'; break;
                    default: msg = '❌ Unknown error';
                }
                this.showError(msg);
            }

            showError(msg) {
                document.getElementById('status').textContent = '❌ ERROR';
                document.getElementById('status').className = 'status-red';
                document.getElementById('debug').textContent = msg;
                alert(msg);
            }

            clearAll() {
                if (confirm('Sab clear karna hai?')) {
                    if (this.marker) this.map.removeLayer(this.marker);
                    this.marker = null;
                    document.getElementById('coords').textContent = 'Lat: -- | Lng: -- | Accuracy: --m';
                    document.getElementById('debugInfo').textContent = '🗑️ Cleared!';
                }
            }
        }

        // Auto start
        window.onload = () => {
            new FixedLocationTracker();
        };
    </script>
</body>
</html>
